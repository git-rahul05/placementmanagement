<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | PlacementHub</title>
    <link rel="stylesheet" href="style.css">


</head>

<body>

    <header>

        <a href="index.html" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 20 20">
                    <path d="M10 2L2 6v8l8 4 8-4V6L10 2z" />
                </svg>
            </div>
            <span class="logo-name">PlacementHub</span>
        </a>

        <!-- <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="team.html">Team</a>
        </nav> -->

        <div class="actions">
            <a href="index.html" class="btn btn-ghost">Logout</a>
        </div>

    </header>


    <div class="student-container">

        <!-- SIDEBAR -->

        <div class="sidebar">

            <h3>Student Panel</h3>

            <ul>

                <li id="dashboardLink" class="active" onclick="showSection('Dashboard')">
                    Dashboard
                </li>

                <li id="profileLink" onclick="showSection('profile')">
                    Profile
                </li>

                <li id="opportunitiesLink" onclick="showSection('opportunities')">
                    Opportunities
                </li>

            </ul>

        </div>


        <!-- CONTENT -->

        <div class="content">

            <div id="Dashboard" class="section active">

                <h2>Dashboard</h2>

            </div>

            <!-- PROFILE SECTION -->

            <div id="profile" class="section">

                <h2>Student Profile</h2>
                <br>

                <form>

                    <h3>Personal Information</h3>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Enter full name">
                    </div>

                    <div class="form-group">
                        <label>College Roll Number</label>
                        <input type="text">
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email">
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel">
                    </div>

                    <br>

                    <h3>Academic Information</h3>

                    <div class="form-group">
                        <label>Branch / Department</label>
                        <select>
                            <option>CSE</option>
                            <option>CSE (AI)</option>
                            <option>IT</option>
                            <option>ECE</option>
                            <option>Mechanical</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Current CGPA</label>
                        <input type="number" step="0.01" placeholder="Example: 8.25">
                    </div>

                    <div class="form-group">
                        <label>Passing Year</label>
                        <input type="number" placeholder="Example: 2028">
                    </div>

                    <br>

                    <h3>Professional Information</h3>

                    <div class="form-group">
                        <label>Primary Skills</label>
                        <textarea rows="4" placeholder="Example: Python, JavaScript, Machine Learning"></textarea>
                    </div>

                    <button class="btn btn-solid" type="submit">
                        Save Profile
                    </button>

                </form>

            </div>


            <!-- OPPORTUNITIES SECTION -->

            <div id="opportunities" class="section">

                <h2>Opportunities</h2>

                <div class="construct">
                    🚧 Under Construction 🚧
                    <br><br>
                    Opportunities will be available soon.
                </div>

            </div>

            

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
